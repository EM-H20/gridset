name: gridset
description: "A new Flutter project."
publish_to: "none"
version: 1.0.9+9
environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter
  # iOS 스타일 아이콘
  cupertino_icons: ^1.0.8
  # 라우팅
  go_router: ^17.0.1
  # 상태 관리 & 데이터 모델
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # 로컬 저장소
  shared_preferences: ^2.3.4
  # UI / 반응형
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.1
  animations: ^2.1.1
  # 유틸리티
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  uuid: ^4.5.2
  connectivity_plus: ^6.1.0
  # 미디어 (사진/영상 갤러리 접근)
  photo_manager: ^3.9.0
  # AssetEntityImage 위젯 (photo_manager 3.x 에서 별도 분리됨)
  photo_manager_image_provider: ^2.1.1
  # 환경 변수 (.env)
  flutter_dotenv: ^6.0.0
  # Firebase (Remote Config 용)
  firebase_core: ^4.1.0
  firebase_remote_config: ^6.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 코드 자동 생성
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  # 앱 아이콘 및 패키지명 변경 자동화
  flutter_launcher_icons: ^0.14.4 # 앱 런처 아이콘 자동 생성
  change_app_package_name: ^1.5.0 # 앱 패키지명 변경 자동화
flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/splash.png
    - assets/wordmark.svg
    - assets/icons/
  fonts:
    - family: MoneygraphyPixel
      fonts:
        - asset: assets/fonts/Moneygraphy-Pixel.ttf
# 앱 런처 아이콘 설정 (flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  remove_alpha_ios: true
  # 적응형 아이콘 (Android 8.0+)
  adaptive_icon_background: "#f7f4ed"
  adaptive_icon_foreground: "assets/app_logo.png"
